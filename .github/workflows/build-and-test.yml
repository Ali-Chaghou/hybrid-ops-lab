name: build-and-test

on:
  push:
  pull_request:

# Zwei eigenstaendige Services -> zwei getrennte Jobs. Jeder Job installiert NUR
# seine Runtime- + Dev-Abhaengigkeiten, bereitet PostgreSQL vor (lokale Instanz via
# apt-Binaries, vom Test-Harness gestartet) und nutzt dieselben Ops-Tools
# (ops.db.bootstrap / ops.db.migrate) wie Compose/Deployment. Kein ensure_schema,
# kein Umgehen des Schema-Checks. Noch KEIN Hybrid-End-to-End/SQS-Test.

jobs:
  consumer-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PostgreSQL server binaries (for the ephemeral test instance)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-16
      - name: Install consumer runtime + dev deps
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r apps/consumer/requirements.txt
          python -m pip install -q -r apps/consumer/requirements-dev.txt
      - name: pip check
        run: python -m pip check
      - name: compileall (consumer + shared ops)
        run: python -m compileall -q apps/consumer/app ops/db
      - name: Consumer test suite (bootstrap + migrate + store, real PostgreSQL)
        working-directory: apps/consumer
        env:
          PG_BINDIR: /usr/lib/postgresql/16/bin
        run: python -m pytest -p no:cacheprovider

  inventory-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PostgreSQL server binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-16
      - name: Install inventory runtime + dev deps
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r apps/inventory/requirements.txt
          python -m pip install -q -r apps/inventory/requirements-dev.txt
      - name: pip check
        run: python -m pip check
      - name: compileall (inventory + shared ops)
        run: python -m compileall -q apps/inventory/app ops/db
      - name: Inventory test suite (real FastAPI lifespan, real PostgreSQL)
        working-directory: apps/inventory
        env:
          PG_BINDIR: /usr/lib/postgresql/16/bin
        run: python -m pytest -p no:cacheprovider

      # Realer HTTP-Contract (angepasst: Schema wird ZUERST migriert; kein ensure_schema).
      - name: HTTP contract — prepare DB, migrate, run app, assert
        env:
          PGBIN: /usr/lib/postgresql/16/bin
        run: |
          set -euo pipefail

          DATA="$(mktemp -d)"
          SOCK="$(mktemp -d)"
          PORT=55432
          APP_PID=""

          cleanup() {
            rc=$?
            trap - EXIT
            if [ -n "${APP_PID:-}" ]; then
              kill "$APP_PID" 2>/dev/null || true
              wait "$APP_PID" 2>/dev/null || true
            fi
            if [ -s "$DATA/postmaster.pid" ]; then
              "$PGBIN/pg_ctl" -D "$DATA" -m immediate -w stop >/dev/null 2>&1 || true
            fi
            if [ "$rc" -ne 0 ] && [ -f "$DATA/log" ]; then
              echo "=== PostgreSQL log ==="
              cat "$DATA/log"
            fi
            rm -rf "$DATA" "$SOCK"
            exit "$rc"
          }
          trap cleanup EXIT

          "$PGBIN/initdb" -D "$DATA" -U postgres --auth=trust -E UTF8 >/dev/null
          "$PGBIN/pg_ctl" -D "$DATA" -o "-k $SOCK -p $PORT -c listen_addresses=127.0.0.1" -l "$DATA/log" -w start

          export PG_ADMIN_DSN="host=127.0.0.1 port=$PORT user=postgres dbname=postgres"
          python -m ops.db.bootstrap

          # Movement-DB anlegen (Owner inventory_admin) und migrieren.
          python -c "import os, psycopg; conn = psycopg.connect(os.environ['PG_ADMIN_DSN'], autocommit=True); conn.execute('CREATE DATABASE inventory OWNER inventory_admin'); conn.close()"
          python -m ops.db.migrate \
            --database-url "host=127.0.0.1 port=$PORT user=inventory_admin dbname=inventory" \
            --migrations-dir apps/inventory/migrations

          # App als Runtime-Rolle inventory_app starten (Schema-Check muss bestehen).
          export DATABASE_URL="host=127.0.0.1 port=$PORT user=inventory_app dbname=inventory"
          export EVENTS_ENABLED=false
          export PYTHONPATH=apps/inventory
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!

          ready=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/readyz || true)
            if [ "$code" = "200" ]; then
              ready=1
              break
            fi
            echo "attempt $i: readyz=$code"
            sleep 1
          done
          [ "$ready" = "1" ] || {
            echo "FAIL readyz: app did not become ready"
            exit 1
          }

          assert_code() {
            expected=$1
            actual=$2
            label=$3
            if [ "$actual" != "$expected" ]; then
              echo "FAIL $label: expected $expected, got $actual"
              exit 1
            fi
            echo "OK $label: $actual"
          }

          code=$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/healthz)
          assert_code 200 "$code" healthz

          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST localhost:8000/movements \
            -H 'Content-Type: application/json' \
            -d '{"sku":"CI-001","quantity":5,"warehouse":"CI"}')
          assert_code 201 "$code" post_valid

          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST localhost:8000/movements \
            -H 'Content-Type: application/json' \
            -d '{"sku":"X","quantity":0,"warehouse":"CI"}')
          assert_code 422 "$code" post_invalid

          code=$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/movements)
          assert_code 200 "$code" get_list

          metrics="$(curl -fsS localhost:8000/metrics)"
          if grep -qE '^inventory_movements_created_total ' <<<"$metrics"; then
            echo "OK metrics"
          else
            echo "FAIL metrics: inventory_movements_created_total missing"
            exit 1
          fi

  publisher-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PostgreSQL server binaries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-16
      - name: Install publisher runtime + dev deps
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r apps/publisher/requirements.txt
          python -m pip install -q -r apps/publisher/requirements-dev.txt
      - name: pip check
        run: python -m pip check
      - name: compileall (publisher + shared ops)
        run: python -m compileall -q apps/publisher/app ops/db
      - name: Publisher test suite (claim/lease/fencing + fake SQS, real PostgreSQL)
        working-directory: apps/publisher
        env:
          PG_BINDIR: /usr/lib/postgresql/16/bin
        run: python -m pytest -p no:cacheprovider
