apiVersion: v1
kind: Namespace
metadata:
  name: inventory
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: consumer-config
  namespace: inventory
data:
  # SQS-Endpoint des Hosts, aus dem Cluster ueber host.k3d.internal erreichbar.
  # In Phase 5 zeigt SQS_ENDPOINT_URL stattdessen auf die Toxiproxy-Adresse.
  SQS_ENDPOINT_URL: "http://host.k3d.internal:9326"
  SQS_QUEUE_URL: "http://host.k3d.internal:9324/000000000000/inventory-movements"
  # Nur fuer die DLQ-Tiefen-Metrik (GetQueueAttributes). Der Consumer liest/loescht
  # NICHT aus der DLQ; das Dead-Lettering macht die native Redrive-Policy.
  SQS_DLQ_QUEUE_URL: "http://host.k3d.internal:9324/000000000000/inventory-movements-dlq"
  AWS_REGION: "eu-central-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: consumer-aws-creds
  namespace: inventory
type: Opaque
stringData:
  # Dummy-Credentials fuer den lokalen Emulator: ElasticMQ ignoriert sie, boto3
  # verlangt nur nicht-leere Werte. KEINE echten Secrets. Gegen echtes AWS
  # wuerde man IRSA / External Secrets nutzen, nicht committete Werte.
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
# Hinweis: Das Secret `consumer-db-creds` (DATABASE_URL fuer consumer_app) wird
# NICHT hier gepflegt. Es wird zur Deploy-Zeit aus der gitignorten sites/cloud/.env
# erzeugt (ops/deploy/deploy-consumer.sh, kubectl create secret --from-file ueber eine
# 0600-Tempdatei, Dateiinhalt = Wert), damit das Passwort weder im Repo noch in
# Prozessargumenten erscheint. Das Deployment referenziert es per secretRef.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-consumer
  namespace: inventory
  labels:
    app: inventory-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-consumer
  template:
    metadata:
      labels:
        app: inventory-consumer
    spec:
      # host.k3d.internal wird in CoreDNS unzuverlaessig injiziert (k3s reconcilet
      # die ConfigMap). Stattdessen die k3d-Netz-Gateway-IP (= VM-Host aus Pod-Sicht)
      # statisch mappen. Der Platzhalter wird beim Deploy ersetzt
      # (ops/deploy/deploy-consumer.sh ermittelt die IP dynamisch).
      hostAliases:
        - ip: "__K3D_GATEWAY__"
          hostnames:
            - "host.k3d.internal"
      containers:
        - name: consumer
          # Platzhalter: deploy-consumer.sh setzt den tatsaechlich gebauten Tag
          # (immutable Release-Tag inventory-consumer:<12hex> in D3B2.1).
          image: __CONSUMER_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # Kontrollierte Lab-Injection. deploy-consumer.sh rendert ausschliesslich
          # den validierten Wert 0 oder 1; der sichere Standard ist 0.
          env:
            - name: LAB_FAIL_AFTER_COMMIT_ONCE
              value: "__LAB_FAIL_AFTER_COMMIT_ONCE__"
          envFrom:
            - configMapRef:
                name: consumer-config
            - secretRef:
                name: consumer-aws-creds
            - secretRef:
                name: consumer-db-creds
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-consumer
  namespace: inventory
  labels:
    app: inventory-consumer
spec:
  # NodePort, damit Prometheus (im monitoring-Compose auf dem VM-Host) /metrics ueber
  # host.docker.internal:<nodePort> scrapen kann. VORAUSSETZUNG: der k3d-Cluster muss
  # 30090 auf den Host veroeffentlichen — das passiert NUR beim Clusteraufbau via
  # ops/bootstrap/create-site-cloud-cluster.sh (k3d cluster create ... --port
  # '30090:30090@server:0'). Ein type:NodePort allein ist NICHT host-erreichbar.
  # ops/deploy/deploy-consumer.sh prueft das fail closed und erzeugt das Scrape-Target.
  type: NodePort
  selector:
    app: inventory-consumer
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30090
