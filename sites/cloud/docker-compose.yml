name: hol-site-cloud

# Startreihenfolge des Consumer-Idempotency-Stores (One-Shot-Setup vor der Runtime):
#   consumer-db (healthy)
#     -> consumer-db-bootstrap   (Cluster-Admin: Rollen idempotent anlegen)
#       -> consumer-db-prepare   (Cluster-Admin: Consumer-DB + Owner consumer_admin)
#         -> consumer-migrate    (consumer_admin: versionierte Migration 0001_init)
# Die Consumer-RUNTIME selbst laeuft in k3d (sites/cloud/k8s) und verbindet sich
# als consumer_app ueber host.k3d.internal:${CONSUMER_DB_HOST_PORT} mit dieser DB.
services:
  sqs:
    image: softwaremill/elasticmq:1.6.16
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    ports:
      - "9324:9324"   # SQS-API (AWS-SDK-kompatibel)
      - "9325:9325"   # ElasticMQ-Management-UI/REST
    restart: unless-stopped

  consumer-db:
    image: postgres:16-alpine
    environment:
      # Cluster-Admin (Superuser) — ausschliesslich fuer Bootstrap/Prepare.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - consumer_pgdata:/var/lib/postgresql/data
    ports:
      # Eigener, konfigurierbarer Host-Port (Default 5433), um Kollisionen mit einem
      # evtl. vorhandenen Host-PostgreSQL (5432) zu vermeiden. Aus dem k3d-Cluster
      # ueber host.k3d.internal:${CONSUMER_DB_HOST_PORT} erreichbar (kein Hardcode-IP).
      - "${CONSUMER_DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Gemeinsames Image (Setup + Runtime), gebaut aus dem Repo-Root.
  consumer-db-bootstrap:
    build:
      context: ../..
      dockerfile: apps/consumer/Dockerfile
    image: hol-consumer:dev
    command: ["python", "-m", "ops.db.bootstrap"]
    environment:
      PG_ADMIN_DSN: "host=consumer-db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB}"
      CONSUMER_ADMIN_PASSWORD: ${CONSUMER_ADMIN_PASSWORD}
      CONSUMER_APP_PASSWORD: ${CONSUMER_APP_PASSWORD}
    depends_on:
      consumer-db:
        condition: service_healthy
    restart: "no"

  consumer-db-prepare:
    image: hol-consumer:dev
    command: ["python", "-m", "ops.db.prepare", "--database", "${CONSUMER_DB}", "--owner", "consumer_admin"]
    environment:
      PG_ADMIN_DSN: "host=consumer-db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB}"
    depends_on:
      consumer-db:
        condition: service_healthy
      consumer-db-bootstrap:
        condition: service_completed_successfully
    restart: "no"

  consumer-migrate:
    image: hol-consumer:dev
    command: ["python", "-m", "ops.db.migrate", "--migrations-dir", "/app/migrations"]
    environment:
      # Migration laeuft als consumer_admin (DB-Owner); DSN ueber ENV, nicht als CLI-Arg.
      DATABASE_URL: "host=consumer-db port=5432 user=consumer_admin password=${CONSUMER_ADMIN_PASSWORD} dbname=${CONSUMER_DB}"
    depends_on:
      consumer-db:
        condition: service_healthy
      consumer-db-prepare:
        condition: service_completed_successfully
    restart: "no"
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    # -proxy-metrics/-runtime-metrics schalten /metrics frei (default aus -> sonst 404).
    command: ["-host=0.0.0.0", "-config=/config/toxiproxy.json", "-proxy-metrics", "-runtime-metrics"]
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    ports:
      - "8474:8474"   # Toxiproxy-API (Toxics steuern)
      - "9326:9326"   # Strecke: Proxy-Listener -> ElasticMQ
    depends_on:
      - sqs
    restart: unless-stopped
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped

volumes:
  consumer_pgdata:
