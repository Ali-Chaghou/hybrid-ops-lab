name: hol-site-cloud
services:
  sqs:
    image: softwaremill/elasticmq:1.6.16
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    ports:
      - "9324:9324"   # SQS-API (AWS-SDK-kompatibel)
      - "9325:9325"   # ElasticMQ-Management-UI/REST
    restart: unless-stopped
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
