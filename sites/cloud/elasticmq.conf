include classpath("application.conf")

# Außen sichtbare Adresse für Queue-URLs. "*" = nimm den Host der eingehenden
# Anfrage (für Docker/Cross-Host empfohlen). Vermeidet hartkodierte IPs.
node-address {
    protocol     = http
    host         = "*"
    port         = 9324
    context-path = ""
}

rest-sqs {
    enabled       = true
    bind-port     = 9324
    bind-hostname = "0.0.0.0"
    sqs-limits    = strict
}

# Queue deklarativ vorprovisioniert (lokales Test-Double). Die produktive
# Definition liegt im OpenTofu-Modul infra/modules/event-queue (AWS-portabel).
# Standard-Queue (kein FIFO), at-least-once. Die DLQ bildet die native
# SQS-Redrive-Policy nach: nach maxReceiveCount Zustellungen verschiebt ElasticMQ
# die Nachricht automatisch in inventory-movements-dlq (kein App-seitiges Send-to-DLQ).
# maxReceiveCount = 5 (siehe docs/decisions/007-dlq-and-redrive.md): hoch genug, dass
# ein kurzer DB-/Queue-Ausfall nicht sofort dead-lettert, niedrig genug, dass eine
# echte Poison Message nach wenigen Visibility-Zyklen die Main-Queue verlaesst.
queues {
    "inventory-movements-dlq" {
        defaultVisibilityTimeout = 30 seconds
        delay                    = 0 seconds
        receiveMessageWait       = 0 seconds
    }
    "inventory-movements" {
        defaultVisibilityTimeout = 30 seconds
        delay                    = 0 seconds
        receiveMessageWait       = 0 seconds
        deadLettersQueue {
            name            = "inventory-movements-dlq"
            maxReceiveCount = 5
        }
    }
}
