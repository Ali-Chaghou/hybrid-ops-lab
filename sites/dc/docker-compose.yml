name: hol-site-dc

# Startreihenfolge (One-Shot-Setup vor der Runtime):
#   db (healthy)
#     -> db-bootstrap            (Cluster-Admin: Rollen idempotent anlegen)
#       -> db-prepare            (Cluster-Admin: Inventory-DB + Owner inventory_admin)
#         -> inventory-migrate   (inventory_admin: versionierte Migrationen)
#           -> inventory         (inventory_app: Runtime, nur Least-Privilege)
# Die Setup-Services laufen genau einmal und beenden mit Exit 0 (restart: "no").

services:
  db:
    image: postgres:16-alpine
    environment:
      # Cluster-Admin (Superuser) â€” ausschliesslich fuer Bootstrap/Prepare.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Gemeinsames Image (Setup + Runtime), gebaut aus dem Repo-Root.
  db-bootstrap:
    build:
      context: ../..
      dockerfile: apps/inventory/Dockerfile
    image: hol-inventory:dev
    command: ["python", "-m", "ops.db.bootstrap"]
    environment:
      PG_ADMIN_DSN: "host=db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB}"
      INVENTORY_ADMIN_PASSWORD: ${INVENTORY_ADMIN_PASSWORD}
      INVENTORY_APP_PASSWORD: ${INVENTORY_APP_PASSWORD}
      # Nur Bootstrap (legt inventory_publisher mit Passwort an) und der publisher-
      # Service erhalten dieses Secret â€” db-prepare/inventory-migrate/inventory NICHT.
      INVENTORY_PUBLISHER_PASSWORD: ${INVENTORY_PUBLISHER_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db-prepare:
    image: hol-inventory:dev
    command: ["python", "-m", "ops.db.prepare"]
    environment:
      PG_ADMIN_DSN: "host=db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB}"
      INVENTORY_DB: ${INVENTORY_DB}
      INVENTORY_DB_OWNER: inventory_admin
    depends_on:
      db:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    restart: "no"

  inventory-migrate:
    image: hol-inventory:dev
    command: ["python", "-m", "ops.db.migrate", "--migrations-dir", "/app/migrations"]
    environment:
      # Migrationen laufen als inventory_admin; DSN ueber ENV (nicht als CLI-Arg).
      DATABASE_URL: "host=db port=5432 user=inventory_admin password=${INVENTORY_ADMIN_PASSWORD} dbname=${INVENTORY_DB}"
    depends_on:
      db:
        condition: service_healthy
      db-prepare:
        condition: service_completed_successfully
    restart: "no"

  inventory:
    image: hol-inventory:dev
    environment:
      # Runtime AUSSCHLIESSLICH als inventory_app â€” kein PG_ADMIN_DSN, kein Admin-Passwort.
      DATABASE_URL: "host=db port=5432 user=inventory_app password=${INVENTORY_APP_PASSWORD} dbname=${INVENTORY_DB}"
      EVENTS_ENABLED: ${EVENTS_ENABLED:-false}
      SQS_ENDPOINT_URL: ${SQS_ENDPOINT_URL:-}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
    ports:
      # Host-Port parametrisierbar, damit der isolierte Smoke-Test nicht mit dem
      # normalen Stack (8000) kollidiert.
      - "${INVENTORY_HOST_PORT:-8000}:8000"
    healthcheck:
      # Keine curl-Abhaengigkeit im Image -> Python-urllib gegen /readyz.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/readyz',timeout=3).status==200 else 1)\""]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
      inventory-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped

  # Outbox-Publisher (Phase 3, Gate D3B1) â€” eigenes Image, eigener Prozess, getrennt
  # von der Inventory-Runtime. IM BASIS-COMPOSE ZWINGEND DEAKTIVIERT: weder dieser
  # Stack noch das Upgrade-Skript aktivieren den Publisher. Eine Aktivierung erfolgt
  # erst in D3B2 ueber eine bewusste, separate Override-Datei (hier nicht enthalten).
  publisher:
    build:
      context: ../../apps/publisher
      dockerfile: Dockerfile
    image: hol-publisher:dev
    environment:
      # Hartkodiert deaktiviert â€” KEINE Substitution aus dem Environment.
      PUBLISHER_ENABLED: "false"
      # Eigene Least-Privilege-DSN (inventory_publisher). Bei disabled wird kein Pool
      # geoeffnet; die DSN wird erst beim spaeteren Enable genutzt.
      DATABASE_URL: "host=db port=5432 user=inventory_publisher password=${INVENTORY_PUBLISHER_PASSWORD} dbname=${INVENTORY_DB}"
      # Eigene Publisher-Route (NICHT die Inventory-SQS-Variablen). Leer = keine Queue.
      SQS_ENDPOINT_URL: ${PUBLISHER_SQS_ENDPOINT_URL:-}
      SQS_QUEUE_URL: ${PUBLISHER_SQS_QUEUE_URL:-}
      AWS_REGION: ${PUBLISHER_AWS_REGION:-eu-central-1}
      # SYNTHETISCHE Emulator-Credentials NUR fuer ElasticMQ (gleiches oeffentliches
      # Lab-Muster wie der Consumer): ElasticMQ ignoriert sie, boto3 braucht aber
      # nicht-leere Werte, sonst durchsucht botocore die Provider-Chain (inkl.
      # EC2-Metadata) und scheitert beim Enable. KEINE echten Secrets, NICHT
      # konfigurierbar. Gegen echtes AWS waeren Workload Identity / IAM-Rolle noetig.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      # Keine Metadata-Abfrage (kein EC2/IMDS-Fallback, kein Timeout).
      AWS_EC2_METADATA_DISABLED: "true"
    ports:
      - "${PUBLISHER_HOST_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)\""]
      interval: 5s
      timeout: 4s
      retries: 12
      start_period: 5s
    depends_on:
      db:
        condition: service_healthy
      inventory-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
