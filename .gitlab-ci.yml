stages:
  - validate

validate:tofu-fmt:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/**/*.tf
  script:
    - tofu fmt -check -recursive infra/

validate:tofu-cloud:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/environments/cloud/*.tf
  script:
    - cd infra/environments/cloud && tofu init -backend=false && tofu validate

validate:tofu-proxmox:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/proxmox/*.tf
  script:
    - cd infra/proxmox
    - tofu init -backend=false
    - tofu validate

validate:shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:stable
  script:
    - find . -type f -name "*.sh" -not -path "./.git/*" -exec shellcheck --severity=warning {} +

validate:yaml:
  stage: validate
  image: pipelinecomponents/yamllint:latest
  script:
    - 'yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .'

validate:secrets:
  stage: validate
  image:
    name: zricethezav/gitleaks:v8.18.4
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-banner --redact
