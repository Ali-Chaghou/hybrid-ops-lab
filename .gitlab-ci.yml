stages:
  - validate

validate:tofu-fmt:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/**/*.tf
  script:
    - tofu fmt -check -recursive infra/

validate:tofu-dc:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/environments/dc/*.tf
  script:
    - cd infra/environments/dc && tofu init -backend=false && tofu validate

validate:tofu-cloud:
  stage: validate
  image:
    name: ghcr.io/opentofu/opentofu:1.12.1
    entrypoint: [""]
  rules:
    - exists:
        - infra/environments/cloud/*.tf
  script:
    - cd infra/environments/cloud && tofu init -backend=false && tofu validate

validate:shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:stable
  script:
    - find . -name "*.sh" -print0 | xargs -0 -r shellcheck --severity=warning

validate:yaml:
  stage: validate
  image: pipelinecomponents/yamllint:latest
  script:
    - 'yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .'

validate:secrets:
  stage: validate
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-banner
